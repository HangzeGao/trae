# Cloud Segmentation Project Configuration (Kaggle 38cloud/95cloud)
# Optimized configuration for production

# Model Configuration
model:
  architecture: "Unet"
  encoder_name: "resnet34"
  encoder_weights: "imagenet"
  in_channels: 4
  out_channels: 1
  activation: "sigmoid"
  model_kwargs:
    encoder_depth: 5
    decoder_channels: [256, 128, 64, 32, 16]

# Training Configuration
training:
  epochs: 20
  batch_size: 8
  learning_rate: 0.001
  weight_decay: 0.00001
  optimizer: "adam"
  loss: "dice_bce"
  num_workers: 0
  patience: 8
  checkpoint_dir: "./checkpoints"

# Data Configuration
data:
  base_path: "/root/.cache/kagglehub/datasets/sorour/38cloud-cloud-segmentation-in-satellite-images/versions/4"
  min_cloud_ratio: 0.1
  max_cloud_ratio: 0.9
  train_val_split: 0.8
