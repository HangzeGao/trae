# Cloud Segmentation Project Configuration
# Optimized for demo/quick training with 38cloud

# Model Configuration
model:
  architecture: "SkySensePP"  # Supported: Unet, UnetPlusPlus, DeepLabV3, DeepLabV3Plus, FPN, PSPNet, SkySensePP
  encoder_name: "resnet34"
  encoder_weights: "imagenet"
  in_channels: 4
  out_channels: 1
  activation: "sigmoid"
  
  # SkySense++ specific configuration
  fusion_type: "adaptive"  # adaptive, transformer, concat
  use_semantic_enhancement: true
  encoder_depth: 5
  decoder_channels: [256, 128, 64, 32, 16]
  dropout: 0.1
  
  # Standard model kwargs for non-SkySensePP architectures
  model_kwargs:
    encoder_depth: 5
    decoder_channels: [256, 128, 64, 32, 16]

# Training Configuration
training:
  epochs: 5  # Quick training for demo
  batch_size: 4
  learning_rate: 0.001
  weight_decay: 0.00001
  optimizer: "adam"
  loss: "dice_bce"
  num_workers: 0
  patience: 8
  checkpoint_dir: "./checkpoints"
  scheduler_patience: 3
  scheduler_factor: 0.5

# Data Configuration
data:
  min_cloud_ratio: 0.0
  max_cloud_ratio: 1.0
  train_val_split: 0.8
  target_channels: 4
  mask_threshold: 127
  normalize: true

# Datasets Configuration
datasets:
  "38cloud":
    name: "38-Cloud"
    base_path: "./data/demo_38cloud"
    schedule_file: "./data/demo_38cloud/train_patches.csv"
    bands: ["blue", "green", "red", "nir"]
    mask_suffix: "gt"
    file_extension: ".TIF"
    weight: 1.0
    train_dir: "38-Cloud_training"

# Sampling Strategies
sampling:
  default_strategy: "weighted"
  sample_size: 20  # For quick validation sampling

# Logging & Output
logging:
  log_dir: "./logs"
  save_best_only: true
  save_freq: 5
